name: SPR QA + Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 1 * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas openpyxl

      - name: Run QA script
        run: python spr_tarkistus.py

      - name: Build GitHub summary
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(Path("dashboard/summary.json").read_text(encoding="utf-8"))
          totals = summary["totals"]

          md = f"""# SPR QA-yhteenveto

          - Tarkistettu osastoja: {totals['tarkistettu']}
          - Rikki: {totals['rikki']}
          - Puutteellinen: {totals['puutteellinen']}
          - OK: {totals['ok']}
          - Vanhentuneet: {totals['vanhentuneet']}
          - Ilman yhteystietoja: {totals['puuttuu_yhteystiedot']}
          - Ilman uutisia: {totals['puuttuu_uutiset']}

          ## Havainnot
          """ + "\n".join([f"- {x}" for x in summary["highlights"]])

          Path("summary.md").write_text(md, encoding="utf-8")
          PY

      - name: Show summary in Actions
        run: cat summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit updated dashboard data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/data.json dashboard/summary.json dashboard/trends.json dashboard/history.json
          git diff --cached --quiet && echo "No dashboard changes to commit" || git commit -m "Update dashboard data"
          git push

      - name: Upload Excel artifact
        uses: actions/upload-artifact@v7
        with:
          name: osasto-raportti
          path: |
            *.xlsx
            summary.md

      - name: Add .nojekyll
        run: touch dashboard/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dashboard

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
